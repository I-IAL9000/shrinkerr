# ============================================================================
# Build and publish Shrinkerr images to GHCR (GitHub Container Registry).
#
# Triggered on:
#   - push to main/master  → floating tags (:latest, :edge, :nvenc, :edge-nvenc)
#   - push of a v* tag     → versioned tags + matching floating ones
#   - manual run via the Actions tab ("Run workflow" button)
#
# Four image variants are built in parallel. Two lineages × two ffmpeg builds:
#
#   Lineage 1 — portable, multi-arch (linux/amd64 + linux/arm64), CPU-only:
#     :latest        Dockerfile,        ffmpeg n7.1    — safe default, runs everywhere
#     :edge          Dockerfile,        ffmpeg master  — bleeding-edge ffmpeg
#
#   Lineage 2 — CUDA + NVENC, amd64 only:
#     :nvenc         Dockerfile.nvenc,  ffmpeg n7.1    — GPU users, driver 525.60.13+
#     :edge-nvenc    Dockerfile.nvenc,  ffmpeg master  — GPU users on driver 570+
#
# Users pick via their compose `image:` line. Most should use :latest. Only
# users with an NVIDIA GPU + the NVIDIA Container Toolkit benefit from :nvenc.
# ============================================================================
name: Build & publish images

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to GHCR (uncheck for a dry-run build)'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write  # Required to push to GHCR

# Opt every JavaScript-based action in this workflow into Node.js 24.
# Node.js 20 is deprecated on GitHub runners (forced to Node 24 by default
# on 2026-06-02, removed entirely 2026-09-16). Rather than chase major-version
# bumps on each action individually (actions/checkout, docker/* actions) and
# risk a breaking change, we just flip GitHub's documented opt-in flag here.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      # Each matrix entry produces one image tag. Variants don't share cache
      # scopes (different Dockerfiles + different ffmpeg builds → different
      # final layers), but the `frontend-build` stage is identical across
      # all four and the CPU-only pair can share some lower layers.
      matrix:
        variant:
          # ── Portable lineage (multi-arch, CPU-only) ──────────────────────
          - suffix: latest
            dockerfile: Dockerfile
            ffmpeg_build: n7.1
            platforms: linux/amd64,linux/arm64
          - suffix: edge
            dockerfile: Dockerfile
            ffmpeg_build: master
            platforms: linux/amd64,linux/arm64
          # ── NVENC lineage (amd64 only, CUDA base) ────────────────────────
          - suffix: nvenc
            dockerfile: Dockerfile.nvenc
            ffmpeg_build: n7.1
            platforms: linux/amd64
          - suffix: edge-nvenc
            dockerfile: Dockerfile.nvenc
            ffmpeg_build: master
            platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Required for cross-arch builds (building arm64 on an amd64 runner).
        # Cheap no-op for the :nvenc variants that are amd64-only.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login on a workflow_dispatch dry-run so this workflow is
        # testable without needing registry credentials set up.
        if: github.event_name != 'workflow_dispatch' || inputs.push_images
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        # Produce a newline-separated list of tags for this variant:
        #   - On a tag push (v0.9.0): ghcr.io/owner/shrinkerr:v0.9.0 (+ floating)
        #   - On main/master push:    ghcr.io/owner/shrinkerr:<suffix>
        #   - workflow_dispatch:      same as main/master
        # GitHub lowercases image names but `github.repository_owner` preserves
        # case — force lowercase so GHCR accepts the tag.
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          BASE="ghcr.io/${OWNER}/shrinkerr"
          SUFFIX="${{ matrix.variant.suffix }}"
          TAGS=""
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            if [[ "$SUFFIX" == "latest" ]]; then
              TAGS="${BASE}:${VERSION}"$'\n'"${BASE}:latest"
            else
              TAGS="${BASE}:${VERSION}-${SUFFIX}"$'\n'"${BASE}:${SUFFIX}"
            fi
          else
            TAGS="${BASE}:${SUFFIX}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Will tag as:"
          echo "$TAGS"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.variant.platforms }}
          # Push on branch/tag pushes; dry-run on workflow_dispatch unless
          # the user explicitly checks the "push" box.
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push_images }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FFMPEG_BUILD=${{ matrix.variant.ffmpeg_build }}
          # Per-variant cache scope — the final layers differ between variants
          # (different Dockerfiles, different ffmpeg builds, different
          # platforms), so collapsing them into one scope would thrash.
          cache-from: type=gha,scope=shrinkerr-${{ matrix.variant.suffix }}
          cache-to: type=gha,mode=max,scope=shrinkerr-${{ matrix.variant.suffix }}
