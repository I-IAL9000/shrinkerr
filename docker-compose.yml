services:
  squeezarr:
    build: .
    container_name: squeezarr
    ports:
      - "6680:6680"
    volumes:
      - ./data:/app/data
      - /home/hal9000/HALHUB:/media:rw
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - SQUEEZARR_DB_PATH=/app/data/squeezarr.db
      - SQUEEZARR_MEDIA_ROOT=/media
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
